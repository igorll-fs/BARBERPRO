<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Tesoura ✂️ estilizada -->
  <g transform="translate(256,240)" fill="none" stroke="#22c55e" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Lâmina esquerda -->
    <ellipse cx="-60" cy="80" rx="40" ry="50" transform="rotate(-15,-60,80)"/>
    <!-- Lâmina direita -->
    <ellipse cx="60" cy="80" rx="40" ry="50" transform="rotate(15,60,80)"/>
    <!-- Hastes -->
    <line x1="-30" y1="40" x2="30" y2="-80"/>
    <line x1="30" y1="40" x2="-30" y2="-80"/>
  </g>
  <!-- Texto PRO -->
  <text x="256" y="420" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="800" font-size="72" fill="#22c55e">PRO</text>
</svg>
